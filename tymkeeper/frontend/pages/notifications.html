<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TymKeeper — Notifications</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <style>
    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: #FAFBFF; }
    .notif-item.unread { background: #F0F7FF; }
    .notif-item.unread:hover { background: #E8F3FF; }
    .unread-dot {
      position: absolute;
      top: 22px; right: 20px;
      width: 9px; height: 9px;
      background: var(--primary);
      border-radius: 50%;
    }
    .notif-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .notif-icon.approved  { background: #D1FAE5; color: #059669; }
    .notif-icon.rejected  { background: #FEE2E2; color: var(--danger); }
    .notif-icon.pending   { background: #FEF3C7; color: var(--warning); }
    .notif-icon.info      { background: var(--primary-100); color: var(--primary); }
    .notif-icon.warning   { background: #FEF3C7; color: var(--warning); }
    .notif-icon.system    { background: #EDE9FE; color: #7C3AED; }
    .notif-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .notif-msg   { font-size: 0.82rem; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
    .notif-time  { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 4px; }
    .filter-tabs {
      display: flex; gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      width: fit-content;
      margin-bottom: 20px;
    }
    .filter-tab {
      padding: 7px 16px; border: none; background: transparent;
      border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer;
      transition: var(--transition); font-family: var(--font-body);
      display: flex; align-items: center; gap: 6px;
    }
    .filter-tab.active { background: var(--primary); color: white; }
    .filter-tab:hover:not(.active) { background: var(--bg); }
    .empty-state {
      text-align: center; padding: 64px 32px; color: var(--text-muted);
    }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="brand">TymKeeper</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="dashboard.html"><i class="ri-dashboard-line"></i> Dashboard</a>
      <a class="nav-item" href="sessions.html"><i class="ri-timer-line"></i> My Sessions</a>
      <a class="nav-item" href="breaks.html"><i class="ri-cup-line"></i> Breaks</a>
      <div class="nav-section-label">Reports</div>
      <a class="nav-item" href="history.html"><i class="ri-history-line"></i> Session History</a>
      <a class="nav-item" href="reports.html"><i class="ri-file-chart-line"></i> Export Reports</a>
      <div class="nav-section-label">Account</div>
      <a class="nav-item active" href="notifications.html">
        <i class="ri-notification-3-line"></i> Notifications
        <span class="nav-badge" id="sidebarBadge" style="display:none;">0</span>
      </a>
      <a class="nav-item" href="profile.html"><i class="ri-user-line"></i> My Profile</a>
      <a class="nav-item" id="logoutBtn"><i class="ri-logout-box-line"></i> Sign Out</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar" id="sidebarAvatar">JD</div>
        <div class="user-info">
          <div class="name" id="sidebarUserName">Loading...</div>
          <div class="role" id="sidebarUserRole">Staff Member</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <button class="icon-btn" id="menuToggle"><i class="ri-menu-line"></i></button>
      <span class="topbar-title">Notifications</span>
      <div class="topbar-right">
        <button class="btn btn-outline btn-sm" id="markAllBtn" onclick="markAllRead()" style="display:none;">
          <i class="ri-check-double-line"></i> Mark All Read
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <h1>Notifications</h1>
          <p id="unreadSummary">Loading your notifications...</p>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" id="tabAll" onclick="switchTab('all')">
          <i class="ri-inbox-line"></i> All
          <span id="countAll" style="background:var(--border);color:var(--text-secondary);padding:1px 7px;border-radius:99px;font-size:0.72rem;">0</span>
        </button>
        <button class="filter-tab" id="tabUnread" onclick="switchTab('unread')">
          <i class="ri-mail-unread-line"></i> Unread
          <span id="countUnread" style="background:#DBEAFE;color:var(--primary);padding:1px 7px;border-radius:99px;font-size:0.72rem;">0</span>
        </button>
        <button class="filter-tab" id="tabApprovals" onclick="switchTab('approvals')">
          <i class="ri-checkbox-circle-line"></i> Approvals
        </button>
        <button class="filter-tab" id="tabSystem" onclick="switchTab('system')">
          <i class="ri-settings-line"></i> System
        </button>
      </div>

      <!-- Notifications List -->
      <div class="card" style="overflow:hidden;">
        <div id="notifList">
          <div class="empty-state">
            <i class="ri-loader-4-line"></i>
            <p>Loading notifications...</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../assets/js/app.js"></script>
<script>
requireAuth();
document.getElementById('logoutBtn').onclick = logout;
const user = JSON.parse(localStorage.getItem('tk_user') || '{}');
const initials = ((user.firstName?.[0]||'')+(user.lastName?.[0]||'')).toUpperCase();
document.getElementById('sidebarAvatar').textContent = initials;

let allNotifications = [];
let currentTab = 'all';

// ─── Notification type config ───
const typeConfig = {
  session_approved: {
    icon: 'ri-checkbox-circle-fill',
    iconClass: 'approved',
    label: 'Session Approved',
    category: 'approvals'
  },
  session_rejected: {
    icon: 'ri-close-circle-fill',
    iconClass: 'rejected',
    label: 'Session Rejected',
    category: 'approvals'
  },
  session_pending: {
    icon: 'ri-time-fill',
    iconClass: 'pending',
    label: 'Session Pending Review',
    category: 'approvals'
  },
  account_disabled: {
    icon: 'ri-user-forbid-fill',
    iconClass: 'warning',
    label: 'Account Update',
    category: 'system'
  },
  account_enabled: {
    icon: 'ri-user-follow-fill',
    iconClass: 'approved',
    label: 'Account Enabled',
    category: 'system'
  },
  system: {
    icon: 'ri-settings-4-fill',
    iconClass: 'system',
    label: 'System',
    category: 'system'
  },
};

function getConfig(type) {
  return typeConfig[type] || {
    icon: 'ri-notification-3-fill',
    iconClass: 'info',
    label: 'Notification',
    category: 'system'
  };
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (m < 1) return 'Just now';
  if (m < 60) return `${m}m ago`;
  if (h < 24) return `${h}h ago`;
  if (d < 7) return `${d}d ago`;
  return new Date(iso).toLocaleDateString('en-ZA', { dateStyle: 'medium' });
}

function renderNotifications(notifications) {
  const el = document.getElementById('notifList');

  if (!notifications.length) {
    const msgs = {
      all: 'You\'re all caught up — no notifications yet.',
      unread: 'No unread notifications.',
      approvals: 'No approval notifications.',
      system: 'No system notifications.'
    };
    el.innerHTML = `<div class="empty-state">
      <i class="ri-notification-off-line"></i>
      <p>${msgs[currentTab] || 'No notifications found.'}</p>
    </div>`;
    return;
  }

  el.innerHTML = notifications.map(n => {
    const cfg = getConfig(n.type);
    return `
      <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markRead('${n.id}', this)">
        <div class="notif-icon ${cfg.iconClass}">
          <i class="${cfg.icon}"></i>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="notif-title">${n.title || cfg.label}</div>
          <div class="notif-msg">${n.message || '—'}</div>
          <div class="notif-time">
            <i class="ri-time-line"></i>
            ${timeAgo(n.created_at)}
            &nbsp;·&nbsp;
            <span class="badge ${cfg.iconClass === 'approved' ? 'badge-success' : cfg.iconClass === 'rejected' ? 'badge-danger' : cfg.iconClass === 'pending' ? 'badge-warning' : 'badge-info'}"
              style="padding:1px 8px;font-size:0.68rem;">
              ${cfg.label}
            </span>
          </div>
        </div>
        ${!n.is_read ? '<div class="unread-dot"></div>' : ''}
      </div>
    `;
  }).join('');
}

function filterNotifications(tab) {
  if (tab === 'all') return allNotifications;
  if (tab === 'unread') return allNotifications.filter(n => !n.is_read);
  if (tab === 'approvals') return allNotifications.filter(n => getConfig(n.type).category === 'approvals');
  if (tab === 'system') return allNotifications.filter(n => getConfig(n.type).category === 'system');
  return allNotifications;
}

function switchTab(tab) {
  currentTab = tab;
  ['all','unread','approvals','system'].forEach(t => {
    document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle('active', t === tab);
  });
  renderNotifications(filterNotifications(tab));
}

async function loadNotifications() {
  const data = await apiRequest('/notifications');
  if (!data) return;

  allNotifications = data.notifications || [];
  const unread = data.unread || 0;

  // Update counts
  document.getElementById('countAll').textContent = allNotifications.length;
  document.getElementById('countUnread').textContent = unread;
  document.getElementById('unreadSummary').textContent = unread > 0
    ? `You have ${unread} unread notification${unread > 1 ? 's' : ''}`
    : 'All notifications read';

  // Show mark all read button if there are unread
  document.getElementById('markAllBtn').style.display = unread > 0 ? 'inline-flex' : 'none';

  // Sidebar badge
  if (unread > 0) {
    document.getElementById('sidebarBadge').style.display = 'inline';
    document.getElementById('sidebarBadge').textContent = unread;
  }

  renderNotifications(filterNotifications(currentTab));
}

async function markRead(id, el) {
  if (!el.classList.contains('unread')) return;
  await apiRequest(`/notifications/${id}/read`, { method: 'PUT' });
  el.classList.remove('unread');
  const dot = el.querySelector('.unread-dot');
  if (dot) dot.remove();
  // Recount
  const unreadCount = document.querySelectorAll('.notif-item.unread').length;
  document.getElementById('countUnread').textContent = unreadCount;
  document.getElementById('unreadSummary').textContent = unreadCount > 0
    ? `You have ${unreadCount} unread notification${unreadCount > 1 ? 's' : ''}`
    : 'All notifications read';
  if (unreadCount === 0) {
    document.getElementById('markAllBtn').style.display = 'none';
    document.getElementById('sidebarBadge').style.display = 'none';
  }
}

async function markAllRead() {
  await apiRequest('/notifications/read-all', { method: 'PUT' });
  showToast('All notifications marked as read', 'success');
  loadNotifications();
}

// ─── Also update dashboard topbar bell if on other pages ───
// Poll for new notifications every 60s
loadNotifications();
setInterval(loadNotifications, 60000);
</script>
</body>
</html>
